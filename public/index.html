<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💕 恋爱记事簿</title>
  <link rel="stylesheet" href="/css/style.css?v=20260423">

</head>
<body>
  <canvas id="heartCanvas"></canvas>

  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <div class="login-hearts">💕</div>
      <h1 class="login-title">恋爱记事簿</h1>
      <p class="login-subtitle">记录我们的甜蜜时光</p>
      <div class="login-form">
        <div class="login-input-group">
          <label>选择身份</label>
          <div class="login-identity-cards">
            <div class="identity-card" data-username="xiaozhong"  data-display="小洋">
              <img class="identity-avatar" src="/images/xiaoyang-avatar.png" alt="小洋">
              <span class="identity-name">小洋</span>
            </div>
            <div class="identity-card" data-username="xiaocai"  data-display="小蔡">
              <img class="identity-avatar" src="/images/xiaocai-avatar.png" alt="小蔡">
              <span class="identity-name">小蔡</span>
            </div>
          </div>
          <p id="identityError" class="field-error"></p>
        </div>
        <div class="login-input-group">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" placeholder="请输入密码">
          <p id="passwordError" class="field-error"></p>
        </div>
        <button id="loginBtn" class="login-btn">登录 💕</button>
        <p id="loginError" class="login-error"></p>
      </div>
    </div>
  </div>

  <div id="app" class="app-container" style="display:none;">
    <header class="app-header">
      <div class="header-left">
        <span class="header-hearts">💕</span>
        <h1 class="header-title">恋爱记事簿</h1>
      </div>
      <div class="header-right">
        <button id="albumBtn" class="album-btn" title="我们的相册">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
          </svg>
        </button>
        <img id="headerAvatar" class="header-avatar" src="/images/xiaoyang-avatar.png" alt="">
        <span id="currentUser" class="current-user"></span>
        <button id="logoutBtn" class="logout-btn" title="退出登录">🚪</button>
      </div>
    </header>

    <main id="chatArea" class="chat-area">
      <div id="loadingIndicator" class="loading-indicator" style="display:none;">
        <div class="loading-spinner"></div>
        <span>加载中...</span>
      </div>
      <div id="messagesContainer" class="messages-container"></div>
    </main>

    <div id="emojiPicker" class="emoji-picker" style="display:none;">
      <div class="emoji-picker-header">
        <span>表情</span>
        <button id="closeEmojiPicker" class="emoji-close-btn">✕</button>
      </div>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <div id="imagePreviewOverlay" class="image-preview-overlay" style="display:none;">
      <div class="image-preview-card">
        <div class="image-preview-header">
          <span>图片预览</span>
          <button id="closeImagePreview" class="emoji-close-btn">✕</button>
        </div>
        <div class="image-preview-body">
          <img id="imagePreviewImg" src="" alt="预览">
        </div>
        <div class="image-preview-footer">
          <button id="cancelImageSend" class="modal-btn modal-btn-cancel">取消</button>
          <button id="confirmImageSend" class="modal-btn modal-btn-save">发送 💕</button>
        </div>
      </div>
    </div>

    <div id="imageViewOverlay" class="modal-overlay" style="display:none;">
      <div class="image-view-container">
        <button id="closeImageView" class="image-view-close">✕</button>
        <img id="imageViewImg" src="" alt="查看图片">
      </div>
    </div>

    <div id="editModal" class="modal-overlay" style="display:none;">
      <div class="modal-card">
        <div class="modal-header">
          <h3>编辑消息</h3>
          <button id="closeEditModal" class="modal-close-btn">✕</button>
        </div>
        <div class="modal-body">
          <textarea id="editContent" class="edit-textarea" rows="4"></textarea>
        </div>
        <div class="modal-footer">
          <button id="cancelEdit" class="modal-btn modal-btn-cancel">取消</button>
          <button id="saveEdit" class="modal-btn modal-btn-save">保存</button>
        </div>
      </div>
    </div>

    <div id="deleteConfirmModal" class="modal-overlay" style="display:none;">
      <div class="modal-card modal-card-small">
        <div class="modal-header">
          <h3>确认删除</h3>
          <button id="closeDeleteModal" class="modal-close-btn">✕</button>
        </div>
        <div class="modal-body">
          <p>确定要删除这条消息吗？此操作不可撤销。</p>
        </div>
        <div class="modal-footer">
          <button id="cancelDelete" class="modal-btn modal-btn-cancel">取消</button>
          <button id="confirmDelete" class="modal-btn modal-btn-delete">删除</button>
        </div>
      </div>
    </div>

    <!-- 我们的相册弹窗 -->
    <div id="albumModal" class="modal-overlay" style="display:none;">
      <div class="album-modal-card">
        <div class="modal-header">
          <h3>📷 我们的相册</h3>
          <button id="closeAlbumModal" class="modal-close-btn">✕</button>
        </div>
        <div class="album-toolbar">
          <label class="album-upload-btn" for="albumImageInput">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
            <span>上传图片</span>
          </label>
          <input type="file" id="albumImageInput" accept="image/*,video/*" multiple style="display:none;">
          <span id="albumCount" class="album-count"></span>
        </div>
        <div id="albumUploadProgress" class="album-upload-progress" style="display:none;">
          <div class="album-progress-bar">
            <div id="albumProgressBar" class="album-progress-fill"></div>
          </div>
          <span id="albumProgressText" class="album-progress-text">上传中...</span>
        </div>
        <div id="albumGrid" class="album-grid">
          <div class="album-empty">
            <div class="album-empty-emoji">📷</div>
            <div class="album-empty-text">还没有照片哦</div>
            <div class="album-empty-subtext">上传第一张照片记录甜蜜瞬间吧~</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 相册图片删除确认 -->
    <div id="albumDeleteModal" class="modal-overlay" style="display:none;">
      <div class="modal-card modal-card-small">
        <div class="modal-header">
          <h3>确认删除</h3>
          <button id="closeAlbumDeleteModal" class="modal-close-btn">✕</button>
        </div>
        <div class="modal-body">
          <p>确定要从相册中删除这张照片吗？此操作不可撤销。</p>
          <div id="albumDeletePreview" class="album-delete-preview"></div>
        </div>
        <div class="modal-footer">
          <button id="cancelAlbumDelete" class="modal-btn modal-btn-cancel">取消</button>
          <button id="confirmAlbumDelete" class="modal-btn modal-btn-delete">删除</button>
        </div>
      </div>
    </div>

    <!-- 相册图片查看大图 -->
    <div id="albumViewOverlay" class="modal-overlay" style="display:none;">
      <div class="image-view-container">
        <button id="closeAlbumView" class="image-view-close">✕</button>
        <div id="albumViewLoading" class="image-view-loading" style="display:none;">
          <div class="loading-spinner"></div>
          <span>加载原图中...</span>
        </div>
        <img id="albumViewImg" src="" alt="查看照片">
      </div>
    </div>

    <footer class="input-area">
      <div class="input-row">
        <button id="emojiBtn" class="emoji-btn" title="表情">😊</button>
        <textarea id="messageInput" class="message-input" placeholder="写下想对Ta说的话..." rows="1"></textarea>
        <input type="file" id="imageInput" accept="image/*" style="display:none;">
        <button id="imageBtn" class="image-btn" title="发送图片">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
          </svg>
        </button>
        <button id="sendBtn" class="send-btn" title="发送">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>

  <script src="/js/app.js?v=20260423"></script>
</body>
</html>
